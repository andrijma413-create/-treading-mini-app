<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .price {
            font-size: 32px;
            font-weight: bold;
            color: #10b981;
            margin: 10px 0;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>BTC/USD</h2>
        <div class="price">$64,231.50</div>
        <p>Аналіз: Ринковий тренд висхідний</p>
        <button onclick="tgClose()">Закрити додаток</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Розгорнути на весь екран

        function tgClose() {
            tg.close();
        }
    </script>
</body>
</html>
