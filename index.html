<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTrade AI Ultra v7.0</title>
    <style>
        :root {
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
            --panel-bg: transparent; 
            --border-color: rgba(255, 255, 255, 0.15);
            --glint: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 100%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #000 url('9741.jpg') center/cover no-repeat fixed;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.15); 
            z-index: 0;
        }

        .content { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; }

        header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--accent-green); font-weight: bold; font-size: 20px; text-shadow: 0 0 15px rgba(46, 204, 113, 0.2); }

        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }

        .menu { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 20px; gap: 12px; }

        .card {
            position: relative;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 0.5px solid var(--border-color);
            border-radius: 22px;
            padding: 22px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--glint);
            opacity: 0.3;
            pointer-events: none;
        }

        .card:active { transform: scale(0.97); }

        .val-text { color: rgba(255, 255, 255, 0.3); font-size: 15px; text-align: right; max-width: 50%; }
        .is-selected-green { color: var(--accent-green); font-weight: bold; text-shadow: 0 0 20px rgba(46, 204, 113, 0.4); }
        .is-selected-white { color: #ffffff; font-weight: bold; }

        .footer { padding: 30px 20px; }
        .btn-main {
            background: var(--accent-green);
            color: #000;
            width: 100%;
            border: none;
            padding: 22px;
            border-radius: 24px;
            font-size: 17px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(46, 204, 113, 0.2);
            transition: 0.3s;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255,255,255,0.15);
            width: 85%;
            max-width: 400px;
            border-radius: 32px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        .search-input {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 12px 15px;
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
            outline: none;
            width: -webkit-fill-available;
        }

        #asset-list, #time-list { overflow-y: auto; flex-grow: 1; margin-top: 5px; }

        .m-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 0.5px solid rgba(255,255,255,0.1);
            color: white;
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border-radius: 18px;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
        }

        #chart-wrapper {
            width: 100%;
            height: 240px;
            border-radius: 20px;
            overflow: hidden;
            margin: 15px 0;
            border: 0.5px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div class="content">
    <header>
        <div class="logo">PRO TRADE AI v7.0</div>
        <div class="lang-btn" onclick="show('lang-modal')">🌐 <span id="cur-lang">UA</span></div>
    </header>

    <div class="menu">
        <div class="card" onclick="showAssets('forex')">
            <span>💱 <span id="txt-forex">Валюти</span></span>
            <span id="val-forex" class="val-text">---</span>
        </div>
        <div class="card" onclick="showAssets('stocks')">
            <span>📈 <span id="txt-stocks">Акції</span></span>
            <span id="val-stocks" class="val-text">---</span>
        </div>
        <div class="card" onclick="show('time-modal')">
            <span>⏱ <span id="txt-time">Час угоди</span></span>
            <span id="val-time" class="val-text">---</span>
        </div>
    </div>

    <div class="footer">
        <button class="btn-main" onclick="analyze()" id="main-btn">Аналізувати ринок</button>
    </div>
</div>

<div id="result-modal" class="modal">
    <div class="modal-content">
        <h3 id="txt-res-head" style="text-align:center; margin-top:0;">Результат</h3>
        <div id="res-signal" style="text-align:center; font-size:24px; font-weight:900;"></div>
        <div id="chart-wrapper"><div id="tradingview_widget" style="height: 100%;"></div></div>
        <button class="m-btn" id="txt-close" style="text-align:center; background: var(--accent-green); color:black; font-weight:bold; border:none;" onclick="closeModal()">ЗАКРИТИ</button>
    </div>
</div>

<div id="lang-modal" class="modal" onclick="hide(this)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="txt-lang-title" style="text-align:center">Мова</h3>
        <button class="m-btn" onclick="setLang('UA')">Українська</button>
        <button class="m-btn" onclick="setLang('EN')">English</button>
        <button class="m-btn" onclick="setLang('RU')">Русский</button>
    </div>
</div>

<div id="time-modal" class="modal" onclick="hide(this)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="txt-time-title" style="text-align:center">Час угоди</h3>
        <div id="time-list">
            <button class="m-btn" onclick="setTime('3 sec')">3 Seconds</button>
            <button class="m-btn" onclick="setTime('15 sec')">15 Seconds</button>
            <button class="m-btn" onclick="setTime('30 sec')">30 Seconds</button>
            <button class="m-btn" onclick="setTime('1 min')">1 Minute</button>
            <button class="m-btn" onclick="setTime('3 min')">3 Minutes</button>
            <button class="m-btn" onclick="setTime('5 min')">5 Minutes</button>
        </div>
    </div>
</div>

<div id="asset-modal" class="modal" onclick="hide(this)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="txt-asset-title" style="text-align:center; margin-bottom:15px;">Оберіть актив</h3>
        <input type="text" id="search-input" class="search-input" placeholder="Пошук..." oninput="filterAssets()">
        <div id="asset-list"></div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentLang = 'UA';
    let selectedAsset = "";
    let currentAssetType = "";

    const translations = {
        'UA': {
            forex: "Валюти", stocks: "Акції", time: "Час угоди", 
            analyze: "Аналізувати ринок", scanning: "Сканування...", 
            resTitle: "Результат", close: "ЗАКРИТИ", langTitle: "Мова",
            timeTitle: "Час угоди", assetTitle: "Оберіть актив",
            up: "ВГОРУ ↑", down: "ВНИЗ ↓", selectError: "Оберіть актив!",
            search: "Пошук..."
        },
        'EN': {
            forex: "Currencies", stocks: "Stocks", time: "Trade Time", 
            analyze: "Analyze Market", scanning: "Scanning...", 
            resTitle: "Result", close: "CLOSE", langTitle: "Language",
            timeTitle: "Trade Time", assetTitle: "Select Asset",
            up: "UP ↑", down: "DOWN ↓", selectError: "Select an asset!",
            search: "Search..."
        },
        'RU': {
            forex: "Валюты", stocks: "Акции", time: "Время сделки", 
            analyze: "Анализировать рынок", scanning: "Сканирование...", 
            resTitle: "Результат", close: "ЗАКРЫТЬ", langTitle: "Язык",
            timeTitle: "Время сделки", assetTitle: "Выберите актив",
            up: "ВВЕРХ ↑", down: "ВНИЗ ↓", selectError: "Выберите актив!",
            search: "Поиск..."
        }
    };

    const assets = {
        forex: [
            "EUR/USD OTC", "GBP/JPY OTC", "EUR/JPY OTC", "EUR/TRY OTC", "GBP/USD OTC",
            "USD/JPY OTC", "USD/CAD OTC", "USD/CHF OTC", "AUD/USD OTC", "CAD/CHF OTC",
            "CAD/JPY OTC", "EUR/CHF OTC", "AED/CNY OTC", "AUD/USD OTC", "BHD/CNY OTC",
            "JOD/CNY OTC", "NGN/USD OTC", "QAR/CNY OTC", "UAH/USD OTC", "USD/CNH OTC",
            "USD/EGP OTC", "USD/IDR OTC", "USD/MXN OTC", "USD/MYR OTC", "USD/PKR OTC",
            "USD/THB OTC", "ZAR/USD OTC", "AUD/CHF OTC", "LBP/USD OTC", "AUD/CAD OTC",
            "EUR/NZD OTC", "USD/PHP OTC", "EUR/GBP OTC", "USD/INR OTC", "GBP/AUD OTC",
            "CAD/JPY", "SAR/CNY OTC", "YER/USD OTC", "AUD/JPY OTC", "KES/USD OTC",
            "MAD/USD OTC", "NZD/USD OTC", "USD/TRY OTC"
        ],
        stocks: [
            "Apple OTC", "Microsoft OTC", "Coinbase Global OTC", "FedEx OTC",
            "Marathon Digital Holdings OTC", "Pfizer Inc OTC", "Boeing Company OTC",
            "American Express OTC", "VISA OTC", "Amazon OTC", "Citigroup Inc OTC",
            "Advanced Micro Devices OTC", "Netflix OTC", "Palantir Technologies OTC",
            "VIX OTC", "ExxonMobil OTC", "Tesla OTC", "Intel OTC",
            "Johnson & Johnson OTC", "FACEBOOK INC OTC"
        ]
    };

    function show(id) { document.getElementById(id).style.display = 'flex'; }
    function hide(el) { el.closest('.modal').style.display = 'none'; }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    function setLang(l) {
        currentLang = l;
        document.getElementById('cur-lang').innerText = l;
        const t = translations[l];
        document.getElementById('txt-forex').innerText = t.forex;
        document.getElementById('txt-stocks').innerText = t.stocks;
        document.getElementById('txt-time').innerText = t.time;
        document.getElementById('main-btn').innerText = t.analyze;
        document.getElementById('txt-res-head').innerText = t.resTitle;
        document.getElementById('txt-close').innerText = t.close;
        document.getElementById('txt-lang-title').innerText = t.langTitle;
        document.getElementById('txt-time-title').innerText = t.timeTitle;
        document.getElementById('txt-asset-title').innerText = t.assetTitle;
        document.getElementById('search-input').placeholder = t.search;
        closeModal();
    }

    function setTime(t) {
        const el = document.getElementById('val-time');
        el.innerText = t;
        el.className = "val-text is-selected-green";
        closeModal();
    }

    function showAssets(type) {
        currentAssetType = type;
        document.getElementById('search-input').value = '';
        renderAssets(assets[type]);
        show('asset-modal');
    }

    function filterAssets() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const filtered = assets[currentAssetType].filter(item => 
            item.toLowerCase().includes(query)
        );
        renderAssets(filtered);
    }

    function renderAssets(listArray) {
        const list = document.getElementById('asset-list');
        list.innerHTML = '';
        listArray.forEach(item => {
            let b = document.createElement('button');
            b.className = 'm-btn';
            b.innerText = item;
            b.onclick = () => {
                let ticker = item.split(' ')[0];
                if(ticker.includes('/')) ticker = ticker.replace('/', '');
                selectedAsset = ticker;
                
                const el = document.getElementById('val-' + currentAssetType);
                el.innerText = item;
                
                const otherType = currentAssetType === 'forex' ? 'stocks' : 'forex';
                document.getElementById('val-' + otherType).innerText = '---';
                document.getElementById('val-' + otherType).className = 'val-text';
                
                el.className = currentAssetType === 'forex' ? "val-text is-selected-green" : "val-text is-selected-white";
                closeModal();
            };
            list.appendChild(b);
        });
    }

    function analyze() {
        const t = translations[currentLang];
        if(!selectedAsset || selectedAsset === "---") { 
            alert(t.selectError); 
            return; 
        }
        const btn = document.getElementById('main-btn');
        btn.innerText = t.scanning;
        btn.disabled = true;
        
        setTimeout(() => {
            const isUp = Math.random() > 0.5;
            const sig = document.getElementById('res-signal');
            sig.innerText = isUp ? t.up : t.down;
            sig.style.color = isUp ? 'var(--accent-green)' : 'var(--accent-red)';
            show('result-modal');
            new TradingView.widget({ 
                "autosize": true, 
                "symbol": selectedAsset, 
                "interval": "1", 
                "theme": "dark", 
                "style": "1", 
                "locale": currentLang.toLowerCase() === 'ua' ? 'uk' : currentLang.toLowerCase(), 
                "hide_top_toolbar": true, 
                "container_id": "tradingview_widget" 
            });
            btn.innerText = t.analyze;
            btn.disabled = false;
        }, 1500);
    }
</script>

</body>
          </html>
