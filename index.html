<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Signals</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #171f2c; color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; padding: 10px; color: #94a3b8; font-size: 14px; }
        .asset-list { background: #1e293b; border-radius: 12px; }
        .asset-item { 
            display: flex; align-items: center; padding: 15px; 
            border-bottom: 1px solid #2d3748; cursor: pointer; 
        }
        .asset-item:active { background: #334155; }
        .icon-pair { display: flex; margin-right: 12px; }
        .flag { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #1e293b; }
        .flag-2 { margin-left: -8px; }
        .asset-info { flex-grow: 1; }
        .profit { color: #10b981; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><span>Актив</span><span>Прибуток</span></div>
    <div class="asset-list" id="list">
        <div class="asset-item" onclick="selectPair('EUR/USD')">
            <div class="icon-pair">
                <img class="flag" src="https://flagcdn.com/w40/eu.png">
                <img class="flag flag-2" src="https://flagcdn.com/w40/us.png">
            </div>
            <div class="asset-info"><b>EUR/USD</b><br><small>OTC</small></div>
            <div class="profit">+92%</div>
        </div>

        <div class="asset-item" onclick="selectPair('GBP/JPY')">
            <div class="icon-pair">
                <img class="flag" src="https://flagcdn.com/w40/gb.png">
                <img class="flag flag-2" src="https://flagcdn.com/w40/jp.png">
            </div>
            <div class="asset-info"><b>GBP/JPY</b><br><small>OTC</small></div>
            <div class="profit">+89%</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function selectPair(pair) {
            // Ця функція відправляє назву пари в бот і закриває вікно
            tg.sendData(pair);
        }
    </script>
</body>
</html>
