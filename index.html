<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #171f2c;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 10px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            font-size: 14px;
            color: #94a3b8;
        }
        .asset-list {
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
        }
        .asset-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #2d3748;
            cursor: pointer;
        }
        .asset-item:active { background: #334155; }
        .icon-pair {
            display: flex;
            margin-right: 15px;
        }
        .flag {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #1e293b;
        }
        .flag-2 { margin-left: -10px; }
        .asset-info { flex-grow: 1; }
        .asset-name { font-weight: bold; font-size: 16px; }
        .asset-type { font-size: 12px; color: #94a3b8; }
        .profit {
            color: #10b981;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <span>Валюти</span>
        <span>Прибуток ↓</span>
    </div>

    <div class="asset-list">
        <div class="asset-item">
            <div class="icon-pair">
                <img class="flag" src="https://flagcdn.com/w40/au.png">
                <img class="flag flag-2" src="https://flagcdn.com/w40/ch.png">
            </div>
            <div class="asset-info">
                <div class="asset-name">AUD/CHF</div>
                <div class="asset-type">OTC</div>
            </div>
            <div class="profit">+92%</div>
        </div>

        <div class="asset-item">
            <div class="icon-pair">
                <img class="flag" src="https://flagcdn.com/w40/eu.png">
                <img class="flag flag-2" src="https://flagcdn.com/w40/us.png">
            </div>
            <div class="asset-info">
                <div class="asset-name">EUR/USD</div>
                <div class="asset-type">OTC</div>
            </div>
            <div class="profit">+92%</div>
        </div>

        <div class="asset-item">
            <div class="icon-pair">
                <img class="flag" src="https://flagcdn.com/w40/gb.png">
                <img class="flag flag-2" src="https://flagcdn.com/w40/jp.png">
            </div>
            <div class="asset-info">
                <div class="asset-name">GBP/JPY</div>
                <div class="asset-type">OTC</div>
            </div>
            <div class="profit">+87%</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.setText("ПОВЕРНУТИСЬ");
        tg.MainButton.show();
    </script>
</body>
</html>

            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>BTC/USD</h2>
        <div class="price">$64,231.50</div>
        <p>Аналіз: Ринковий тренд висхідний</p>
        <button onclick="tgClose()">Закрити додаток</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Розгорнути на весь екран

        function tgClose() {
            tg.close();
        }
    </script>
</body>
</html>
